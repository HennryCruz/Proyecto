workflows:
  android-debug:
    name: Inventario CENAM - Android APK
    max_build_duration: 60
    environment:
      flutter: 3.41.6
      java: 17
    scripts:
      - name: Obtener dependencias
        script: flutter pub get
      - name: Compilar APK
        script: flutter build apk --debug --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
