name: inventario_cenam
description: Sistema de Inventario CENAM - Escaneo de activos con cámara

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  mobile_scanner: ^5.2.3
  path_provider: ^2.1.2
  intl: ^0.19.0
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/localizaciones.txt
    - assets/activos.txt
    - assets/activos_teorico.csv
