name: inventario_cenam
description: Sistema de Inventario CENAM - Escaneo de activos con cámara

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  mobile_scanner: ^5.2.3
  path_provider: ^2.1.2
  intl: ^0.19.0
  share_plus: ^9.0.0
  vibration: ^2.0.0
  excel: ^4.0.6
  open_file: ^3.3.2
  wakelock_plus: ^1.2.8
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.1.2
  image: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/localizaciones.txt
    - assets/activos.txt
    - assets/activos_teorico.csv
