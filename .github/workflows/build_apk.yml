name: Build APK - Inventario CENAM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Flutter 3.41.6
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Obtener dependencias
        run: flutter pub get

      - name: Compilar APK debug
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: inventario-cenam-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
